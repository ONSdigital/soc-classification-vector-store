steps:
  - name: gcr.io/$PROJECT_ID/testrunner
    args:
      - '-c'
      - |
        set -e
        echo === Looking up config from parameter store ===
        dev_config=$(gcloud parametermanager parameters versions describe dev --parameter=infra-test-config --location=global --project $PROJECT_ID --format=json | python3 -c "import sys, json; print(json.load(sys.stdin)['payload']['data'])" | base64 --decode)
        SOC_IMAGE_DEV=$(echo $dev_config | python3 -c "import sys, json; print(json.load(sys.stdin)['cr-soc-image'])")
        
        preprod_config=$(gcloud parametermanager parameters versions describe preprod --parameter=infra-test-config --location=global --project $PROJECT_ID --format=json | python3 -c "import sys, json; print(json.load(sys.stdin)['payload']['data'])" | base64 --decode)
        SOC_IMAGE_RELEASES=$(echo $preprod_config | python3 -c "import sys, json; print(json.load(sys.stdin)['cr-soc-image'])")
        SOC_URL=$(echo $preprod_config | python3 -c "import sys, json; print(json.load(sys.stdin)['cr-soc-url'])")
        API_SA=$(echo $preprod_config | python3 -c "import sys, json; print(json.load(sys.stdin)['cr-api-sa'])")
        PREPROD_PROJECT_ID=$(echo $preprod_config | python3 -c "import sys, json; print(json.load(sys.stdin)['project-id'])")
        
        echo === Pulling image dev image with tag $SHORT_SHA ===
        docker pull $$SOC_IMAGE_DEV:$SHORT_SHA

        echo === Build Docker image, tag and push to GAR ===
        docker tag $$SOC_IMAGE_DEV:$SHORT_SHA $$SOC_IMAGE_RELEASES:$TAG_NAME
        docker push $$SOC_IMAGE_RELEASES:$TAG_NAME

        echo === Deploy cloud run service ===
        gcloud run deploy soc-vector-store --image=$$SOC_IMAGE_RELEASES:$TAG_NAME --region $LOCATION --project $$PREPROD_PROJECT_ID

        export SOC_VECTOR_STORE_URL="$$SOC_URL/$_API_VERSION/soc-vector-store"
        export SA_ID_TOKEN=`gcloud auth print-identity-token --impersonate-service-account=$$API_SA`

        echo === Waiting 5 minutes to allow SOC API to get ready... ===
        sleep 300

        echo === Run smoke tests against deployed service ===
        poetry run pytest cicd

    id: Tag and push release image, deploy to preprod and run smoke tests
    entrypoint: bash
timeout: 2000s
options:
  logging: CLOUD_LOGGING_ONLY
